<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выбор цвета</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #181818;
            color: white;
            display: flex;
            flex-direction: column;
            align-content: center;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        h3 { margin-bottom: 20px; font-weight: normal; }
        .picker-wrapper { position: relative; margin-bottom: 30px; }
        /* Красиво стилизуем круглую кнопку выбора цвета */
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 4px solid #ffffff; border-radius: 50%; }
        
        button {
            background-color: #248b1d;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:active { background-color: #1a6615; }
    </style>
</head>
<body>

    <h3>Нажми на круг, чтобы выбрать цвет</h3>
    
    <div class="picker-wrapper">
        <input type="color" id="colorPicker" value="#000000">
    </div>

    <button id="sendColor">Подобрать цвет</button>

    <script>
        // Инициализируем WebApp Телеграма
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширяем окно на весь экран

        const picker = document.getElementById('colorPicker');
        const btn = document.getElementById('sendColor');

        btn.addEventListener('click', () => {
            const hexColor = picker.value.toUpperCase(); // Получаем цвет, например #FF5733
            
            // Самая главная строчка: отправляем данные в бот
            tg.sendData(hexColor); 
        });
    </script>
</body>
</html>
