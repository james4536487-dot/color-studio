<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Палитра Цветов</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>
    
    <style>
        :root {
            --selected-color: #00ff88;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0d0e12;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            margin: 0;
            padding: 30px 20px;
            box-sizing: border-box;
            overflow: hidden;
            /* Динамический живой фон, который слегка подсвечивается выбранным цветом */
            background: radial-gradient(circle at center, rgba(13, 14, 18, 1) 0%, rgba(5, 5, 8, 1) 100%);
            transition: background 0.4s ease;
        }

        /* Задний размытый фон для сочности цвета */
        .glow-bg {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--selected-color);
            filter: blur(120px);
            opacity: 0.15;
            z-index: 1;
            pointer-events: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: background 0.3s ease;
        }

        .header {
            text-align: center;
            z-index: 2;
            margin-top: 10px;
        }

        .header h3 {
            font-size: 22px;
            font-weight: 600;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 0%, #a5a7b0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 14px;
            color: #707579;
            margin: 0;
        }

        /* Контейнер для колеса */
        .picker-container {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* Вывод HEX-кода в реальном времени */
        .color-value {
            text-align: center;
            font-family: "Courier New", Courier, monospace;
            font-size: 24px;
            font-weight: bold;
            margin-top: 15px;
            color: var(--selected-color);
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: color 0.2s ease;
        }

        /* Кнопка подтверждения */
        .submit-btn {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 280px;
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 16px 0;
            font-size: 16px;
            font-weight: 600;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,255,255,0.1);
            transition: all 0.2s ease;
            margin-bottom: 20px;
        }

        .submit-btn:active {
            transform: scale(0.97);
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="glow-bg" id="glowBg"></div>

    <div class="header">
        <h3>Выберите цвет</h3>
        <p>Настройте идеальный фон для рендера</p>
    </div>
    
    <div class="picker-container">
        <div id="picker"></div>
        <div class="color-value" id="hexDisplay">#00FF88</div>
    </div>

    <button class="submit-btn" id="sendColor">Применить цвет</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // Настраиваем цветовую палитру iro.js
        const colorPicker = new iro.ColorPicker("#picker", {
            width: 240,
            color: "#000000",
            layout: [
                { component: iro.ui.Wheel, options: {} },
                { component: iro.ui.Slider, options: { sliderType: 'value' } }
            ],
            // Стилизуем само колесо под общий дизайн
            borderWidth: 2,
            borderColor: "rgba(255,255,255,0.1)"
        });

        const hexDisplay = document.getElementById('hexDisplay');
        const glowBg = document.getElementById('glowBg');
        const btn = document.getElementById('sendColor');

        // Следим за изменением цвета в реальном времени
        colorPicker.on('color:change', function(color) {
            const hex = color.hexString.toUpperCase();
            hexDisplay.textContent = hex;
            
            // Динамически меняем свечение и цвет текста под выбранный цвет
            document.documentElement.style.setProperty('--selected-color', hex);
        });

        // Отправка данных в бот
        btn.addEventListener('click', () => {
            const finalColor = colorPicker.color.hexString.toUpperCase();
            tg.sendData(finalColor);
        });
    </script>
</body>
</html>
