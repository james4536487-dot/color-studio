<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Color Studio</title>

    <!-- SDK и Библиотеки -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>

    <!-- Премиальный шрифт Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent-color: #00ffaa;
            --accent-rgb: 0, 255, 170;
            --bg-main: #060709;
            --panel-bg: rgba(18, 20, 28, 0.6);
            --panel-border: rgba(255, 255, 255, 0.04);
            --text-muted: #7e8494;
        }

        /* Фикс пиксельных косяков и кривых краёв в iro.js */
        #picker svg {
            shape-rendering: geometricPrecision !important;
            image-rendering: -webkit-optimize-contrast !important;
        }

        /* Включаем аппаратное сглаживание и убираем субпиксельный сдвиг */
        .IroSlider, .IroWheel, .iro__slider {
            transform: translate3d(0, 0, 0);
            will-change: transform;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        /* Маскируем микро-вылеты градиента за пределы трека ползунка */
        .iro__slider rect {
            stroke: transparent !important;
            stroke-width: 1px !important;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: #ffffff;
            margin: 0;
            padding: 20px 16px calc(20px + env(safe-area-inset-bottom)) 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background: radial-gradient(circle at 50% 0%, rgba(var(--accent-rgb), 0.08) 0%, rgba(6, 7, 9, 1) 75%);
        }

        /* Живой неоновый бэкграунд */
        .neon-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--accent-color);
            filter: blur(140px);
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: background 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .container {
            width: 100%;
            max-width: 400px;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Шапка */
        .app-header {
            text-align: center;
            margin-bottom: 5px;
        }

        .app-header h1 {
            font-size: 26px;
            font-weight: 800;
            margin: 0 0 6px 0;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 30%, #a2a8b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .app-header p {
            font-size: 13px;
            color: var(--text-muted);
            margin: 0;
            font-weight: 500;
        }

        /* Интерактивный Мокап Рендера */
        .mockup-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 16px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .mockup-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .mockup-title span {
            width: 6px;
            height: 6px;
            background: var(--accent-color);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-color);
        }

        .mockup-display {
            height: 110px;
            border-radius: 16px;
            background-color: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: background-color 0.3s ease;
        }

        .mockup-display::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0.03;
            background-image: linear-gradient(45deg, #cbd5e1 25%, transparent 25%), linear-gradient(-45deg, #cbd5e1 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #cbd5e1 75%), linear-gradient(-45deg, transparent 75%, #cbd5e1 75%);
            background-size: 16px 16px;
            background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
        }

        .mockup-sticker {
            font-size: 54px;
            z-index: 1;
            filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.3));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-6px);
            }
        }

        /* Основной блок управления */
        .studio-panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 28px;
            padding: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 22px;
        }

        .wheel-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wheel-center-info {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .hex-output {
            font-family: monospace;
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .section-title {
            align-self: flex-start;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin: 5px 0 -5px 2px;
        }

        .presets-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            width: 100%;
        }

        .preset-btn {
            aspect-ratio: 1;
            border-radius: 14px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            position: relative;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 0;
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.1), 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .preset-btn:active {
            transform: scale(0.88);
        }

        .preset-btn.active {
            border-color: #ffffff;
            box-shadow: 0 0 15px var(--accent-color);
            transform: scale(1.05);
        }

        .action-button {
            width: 100%;
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 18px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.08);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 5px;
        }

        .action-button:active {
            transform: scale(0.96);
            background-color: #e2e8f0;
        }

        .action-button svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }
    </style>
</head>

<body>

    <div class="neon-glow" id="neonGlow"></div>

    <div class="container">

        <!-- Шапка -->
        <div class="app-header">
            <h1>Color Studio!</h1>
            <p>Премиальный рендеринг и кастомизация</p>
        </div>

        <!-- Мокап превью -->
        <div class="mockup-card">
            <div class="mockup-title">
                <span id="statusDot"></span>Живой предпросмотр рендера
            </div>
            <div class="mockup-display" id="previewDisplay">
                <div class="mockup-sticker">😎</div>
            </div>
        </div>

        <!-- Панель управления цветом -->
        <div class="studio-panel">

            <!-- Колесо iro.js -->
            <div class="wheel-wrapper">
                <div id="picker"></div>
                <div class="wheel-center-info">
                    <div class="hex-output" id="hexText">#00FFAA</div>
                </div>
            </div>

            <!-- Раздел готовых пресетов -->
            <div class="section-title">Дизайнерские пресеты</div>
            <div class="presets-grid" id="presetsContainer">
                <button class="preset-btn" style="background: #000000;" data-color="#000000"></button>
                <button class="preset-btn" style="background: #FFFFFF;" data-color="#FFFFFF"></button>
                <button class="preset-btn" style="background: #1A1C24;" data-color="#1A1C24"></button>
                <button class="preset-btn" style="background: #FF3366;" data-color="#FF3366"></button>
                <button class="preset-btn" style="background: #00E5FF;" data-color="#00E5FF"></button>
                <button class="preset-btn" style="background: #7000FF;" data-color="#7000FF"></button>
                <button class="preset-btn" style="background: #FFB300;" data-color="#FFB300"></button>
                <button class="preset-btn" style="background: #00FF66;" data-color="#00FF66"></button>
                <button class="preset-btn" style="background: #FF5500;" data-color="#FF5500"></button>
                <button class="preset-btn" style="background: #0055FF;" data-color="#0055FF"></button>
            </div>

            <!-- Главная кнопка применения -->
            <button class="action-button" id="submitColor">
                <svg viewBox="0 0 24 24">
                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z" />
                </svg>
                Применить для фона
            </button>

        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const colorPicker = new iro.ColorPicker("#picker", {
            width: 250,
            color: "#00FFAA",
            handleRadius: 10,
            activeHandleRadius: 14,
            wheelLightness: false,
            layout: [
                { component: iro.ui.Wheel, options: {} },
                { component: iro.ui.Slider, options: { sliderType: 'value', margin: 25 } }
            ],
            borderWidth: 2,
            borderColor: "rgba(255, 255, 255, 0.08)"
        });

        const hexText = document.getElementById('hexText');
        const previewDisplay = document.getElementById('previewDisplay');
        const neonGlow = document.getElementById('neonGlow');
        const submitBtn = document.getElementById('submitColor');
        const presetButtons = document.querySelectorAll('.preset-btn');

        const McKayHaptic = () => {
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        };

        colorPicker.on(['color:change', 'color:init'], function (color) {
            const hex = color.hexString.toUpperCase();

            hexText.textContent = hex;
            document.documentElement.style.setProperty('--accent-color', hex);

            const r = color.rgb.r, g = color.rgb.g, b = color.rgb.b;
            document.documentElement.style.setProperty('--accent-rgb', `${r}, ${g}, ${b}`);

            previewDisplay.style.backgroundColor = hex;

            presetButtons.forEach(btn => {
                if (btn.getAttribute('data-color') !== hex) {
                    btn.classList.remove('active');
                }
            });
        });

        let isInputActive = false;
        colorPicker.on('input:start', () => { isInputActive = true; });
        colorPicker.on('input:end', () => {
            if (isInputActive) {
                McKayHaptic();
                isInputActive = false;
            }
        });

        // ИСПРАВЛЕНО: Теперь кнопки пресетов корректно меняют цвет в iro.js v5
        presetButtons.forEach(button => {
            button.addEventListener('click', (e) => {
                const selectedColor = e.currentTarget.getAttribute('data-color');

                McKayHaptic();

                // Правильный метод изменения цвета для этой библиотеки
                colorPicker.color.set(selectedColor);

                presetButtons.forEach(b => b.classList.remove('active'));
                button.classList.add('active');
            });
        });

        submitBtn.addEventListener('click', () => {
            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }

            const finalHex = colorPicker.color.hexString.toUpperCase();
            tg.sendData(finalHex);
        });
    </script>
</body>

</html>
