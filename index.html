<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Color Studio — Палитра Краузера</title>

    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Крутой и стабильный плагин палитры Iro.js -->
    <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>

    <!-- Премиальный шрифт Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent-color: #00ffaa;
            --accent-rgb: 0, 255, 170;
            --bg-main: #0c0e12;
            --panel-bg: #14171f;
            --panel-border: rgba(255, 255, 255, 0.06);
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* Общие сбросы и разметка */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            font-family: var(--font-family);
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 24px 16px calc(24px + env(safe-area-inset-bottom)) 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Заднее свечение делаем супер-мягким и фоновым, чтобы не слепило */
        .neon-glow {
            position: absolute;
            width: 250px;
            height: 250px;
            background: var(--accent-color);
            filter: blur(140px);
            opacity: 0.08;
            pointer-events: none;
            z-index: 0;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: background 0.4s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            width: 100%;
            max-width: 360px;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* Шапка приложения */
        .header {
            text-align: center;
            margin-top: 10px;
            margin-bottom: 5px;
            cursor: default;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }

        .header p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
            font-weight: 400;
        }

        /* Панель превью */
        .preview-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            transition: border-color 0.2s ease;
        }

        .preview-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .message-bubble {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .bubble-text {
            font-size: 13px;
            line-height: 1.4;
            color: #94a3b8;
        }

        .bubble-emoji-preview {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 8px;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            border-left: 2px solid var(--accent-color);
            transition: border-color 0.2s ease;
        }

        .sticker-mock {
            width: 28px;
            height: 28px;
            background: var(--accent-color);
            border-radius: 4px;
            transition: background 0.2s ease;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sticker-mock::after {
            content: "✨";
            font-size: 14px;
        }

        .sticker-details {
            display: flex;
            flex-direction: column;
        }

        .sticker-details .name {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-main);
        }

        .sticker-details .status {
            font-size: 9px;
            color: var(--text-muted);
        }

        /* Контейнер выбора цвета */
        .picker-container {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 20px;
            padding: 20px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        #picker {
            margin: 0 auto;
        }

        .IroWheel, .IroSlider {
            cursor: crosshair;
        }

        /* Исправление артефактов наложения в Iro.js */
        #picker svg {
            shape-rendering: geometricPrecision !important;
            image-rendering: -webkit-optimize-contrast !important;
        }

        .iro__slider, .IroSlider, .IroSliderGrab {
            clip-path: inset(0.5px round 20px) !important;
            -webkit-clip-path: inset(0.5px round 20px) !important;
        }

        .iro__slider rect {
            stroke: transparent !important;
            stroke-width: 1.5px !important;
        }

        /* HEX поле ввода */
        .hex-input-wrapper {
            width: 100%;
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 8px 12px;
            gap: 6px;
            transition: border-color 0.2s ease;
        }

        .hex-input-wrapper:focus-within {
            border-color: rgba(var(--accent-rgb), 0.3);
        }

        .hex-hash {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .hex-input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 600;
            outline: none;
            text-transform: uppercase;
            cursor: text;
        }

        /* Сетка быстрых пресетов (круглые лаконичные свотчи) */
        .presets-grid {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 6px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 12px;
        }

        .preset-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 1.5px solid rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.2s ease;
            position: relative;
        }

        .preset-btn:active {
            transform: scale(0.85);
        }

        @media (hover: hover) {
            .preset-btn:hover {
                transform: scale(1.12);
            }
        }

        .preset-btn.active {
            border-color: #ffffff;
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.15);
        }

        /* Главная матовая кнопка применения */
        .apply-button {
            width: 100%;
            background: var(--accent-color);
            color: #0c0e12;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .apply-button:active {
            transform: scale(0.98);
        }

        @media (hover: hover) {
            .apply-button:hover {
                opacity: 0.95;
            }
        }

        svg {
            shape-rendering: geometricPrecision;
        }

        /* Лаконичный человеческий подвал */
        .footer {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 10px;
            font-weight: 500;
            cursor: default;
        }

        .footer span {
            color: var(--accent-color);
            font-weight: 700;
        }
    </style>
</head>

<body>

    <div class="neon-glow" id="glow"></div>

    <div class="container">
        <!-- Шапка -->
        <div class="header">
            <h1>Color Studio</h1>
            <p>Создайте свой идеальный оттенок</p>
        </div>

        <!-- Живое превью -->
        <div class="preview-card">
            <span class="preview-title" id="preview-tag">Превью результата</span>
            <div class="message-bubble">
                <div class="bubble-text">
                    Ваш пак перекрасится в выбранный оттенок. Все тени и градиенты останутся на месте.
                </div>
                <div class="bubble-emoji-preview">
                    <div class="sticker-mock" id="sticker-preview"></div>
                    <div class="sticker-details">
                        <span class="name">Krauser Pack</span>
                        <span class="status" id="status-color">Оттенок: #00FFAA</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Блок выбора цвета -->
        <div class="picker-container">
            <!-- Виджет Iro.js -->
            <div id="picker"></div>

            <!-- HEX ввод -->
            <div class="hex-input-wrapper">
                <span class="hex-hash">#</span>
                <input type="text" class="hex-input" id="hex-val" maxlength="6" value="00FFAA">
            </div>

            <!-- Сетка быстрых пресетов -->
            <div class="presets-grid">
                <button class="preset-btn" style="background-color: #FF3333;" data-color="#FF3333"></button>
                <button class="preset-btn" style="background-color: #FF8800;" data-color="#FF8800"></button>
                <button class="preset-btn" style="background-color: #FFE000;" data-color="#FFE000"></button>
                <button class="preset-btn" style="background-color: #22CC44;" data-color="#22CC44"></button>
                <button class="preset-btn" style="background-color: #1177FF;" data-color="#1177FF"></button>
                <button class="preset-btn" style="background-color: #9922EE;" data-color="#9922EE"></button>
                <button class="preset-btn" style="background-color: #FF007F;" data-color="#FF007F"></button>
                <button class="preset-btn" style="background-color: #00FFAA;" data-color="#00FFAA"></button>
            </div>
        </div>

        <!-- Кнопка применения -->
        <button class="apply-button" id="apply-btn">
            Применить цвет
        </button>

        <!-- Подпись создателя -->
        <div class="footer">
            Создано с помощью <span>Krauser</span>
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Поддержка темы Telegram
        const tgTheme = tg.themeParams;
        if (tgTheme) {
            if (tgTheme.bg_color) {
                document.documentElement.style.setProperty('--bg-main', tgTheme.bg_color);
            }
            if (tgTheme.text_color) {
                document.documentElement.style.setProperty('--text-main', tgTheme.text_color);
            }
            if (tgTheme.hint_color) {
                document.documentElement.style.setProperty('--text-muted', tgTheme.hint_color);
            }
            if (tgTheme.secondary_bg_color) {
                document.documentElement.style.setProperty('--panel-bg', tgTheme.secondary_bg_color);
            }
        }

        // Инициализация палитры Iro.js
        const colorPicker = new iro.ColorPicker("#picker", {
            width: 250,
            color: "#00ffaa",
            borderWidth: 2,
            borderColor: "rgba(255, 255, 255, 0.1)",
            layout: [
                {
                    component: iro.ui.Wheel,
                    options: {}
                },
                {
                    component: iro.ui.Slider,
                    options: {
                        sliderType: 'value'
                    }
                }
            ]
        });

        const hexInput = document.getElementById("hex-val");
        const glow = document.getElementById("glow");
        const stickerPreview = document.getElementById("sticker-preview");
        const previewTag = document.getElementById("preview-tag");
        const statusColor = document.getElementById("status-color");
        const presetBtns = document.querySelectorAll(".preset-btn");

        // Функция обновления цветов во всех UI элементах
        function updateUI(color) {
            const hex = color.hexString;
            const rgb = `${color.rgb.r}, ${color.rgb.g}, ${color.rgb.b}`;

            // Обновляем CSS переменные
            document.documentElement.style.setProperty('--accent-color', hex);
            document.documentElement.style.setProperty('--accent-rgb', rgb);

            // Меняем текст
            hexInput.value = hex.replace("#", "");
            statusColor.textContent = `Оттенок: ${hex.toUpperCase()}`;

            // Сбрасываем активные пресеты
            presetBtns.forEach(btn => {
                if (btn.getAttribute("data-color").toUpperCase() === hex.toUpperCase()) {
                    btn.classList.add("active");
                } else {
                    btn.classList.remove("active");
                }
            });
        }

        // При изменении цвета в палитре
        colorPicker.on('color:change', function (color) {
            updateUI(color);
            // Легкая тактильная отдача при вращении колеса
            if (tg.HapticFeedback) {
                tg.HapticFeedback.selectionChanged();
            }
        });

        // Ручной ввод HEX кода
        hexInput.addEventListener('input', function (e) {
            let val = e.target.value.replace(/[^0-9A-Fa-f]/g, '');
            e.target.value = val;
            if (val.length === 6) {
                colorPicker.color.hexString = "#" + val;
                updateUI(colorPicker.color);
            }
        });

        // Выбор через быстрые пресеты
        presetBtns.forEach(btn => {
            btn.addEventListener('click', function () {
                const colorHex = this.getAttribute("data-color");
                colorPicker.color.hexString = colorHex;
                updateUI(colorPicker.color);

                if (tg.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('light');
                }
            });
        });

        // Отправка цвета в бот при подтверждении
        document.getElementById("apply-btn").addEventListener('click', function () {
            const finalColor = colorPicker.color.hexString;

            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }

            // Пытаемся отправить данные боту
            try {
                tg.sendData(finalColor);
                // Закрываем окно WebApp
                setTimeout(() => {
                    tg.close();
                }, 100);
            } catch (err) {
                alert("Ошибка отправки цвета: " + err.message);
            }
        });
    </script>
</body>

</html>
